<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Intelligent Q&A System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🤖 RAG Bot</h2>
                <button class="btn-icon" id="newChatBtn" title="New Chat">+</button>
            </div>
            <div class="sidebar-content">
                <div class="upload-section">
                    <h3>📁 Document Management</h3>
                    <input type="file" id="fileInput" multiple accept=".txt,.html,.pdf" style="display: none;">
                    <button class="btn-secondary" id="uploadBtn">Upload Documents</button>
                    <button class="btn-secondary" id="clearFilesBtn">Clear Documents</button>
                    <div id="fileList" class="file-list"></div>
                </div>
                <div class="user-section">
                    <div class="user-info">
                        <span id="username">User</span>
                    </div>
                    <button class="btn-secondary" id="logoutBtn">Log Out</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Area -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <h1>Welcome to the RAG Intelligent Q&A System</h1>
                    <p>After you upload documents, I can answer your questions based on their content.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="questionInput" 
                        placeholder="Enter your question..." 
                        rows="1"
                        maxlength="1000"></textarea>
                    <button id="sendBtn" class="send-button" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="hint">Press Enter to send, Shift+Enter for a new line</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p>AI is thinking...</p>
    </div>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
